<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="28" fill="#F8F4EC"/>
  <text x="86" y="94" fill="#151515" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700">Anatomy of a VitalClaw Alert</text>
  <text x="86" y="132" fill="#68625A" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">Why this is not just “AI summarizing your health data”</text>

  <rect x="88" y="176" width="640" height="416" rx="26" fill="#FFFDF9" stroke="#E3DACB" stroke-width="2"/>
  <rect x="116" y="208" width="160" height="42" rx="21" fill="#FAE7DE"/>
  <text x="196" y="236" text-anchor="middle" fill="#A14F2A" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="700">recovery_suppression</text>
  <text x="116" y="288" fill="#111111" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700">Recovery looks suppressed</text>
  <text x="116" y="332" fill="#5E5952" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">Multiple signals drifted together for 3 days.</text>

  <rect x="116" y="372" width="584" height="178" rx="20" fill="#FAF7F1" stroke="#E6DED0"/>
  <text x="144" y="410" fill="#111111" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">HRV: 42 ms   baseline 58 ± 6   z = -2.7</text>
  <text x="144" y="450" fill="#111111" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">RHR: 64 bpm  baseline 54 ± 3   z = +3.3</text>
  <text x="144" y="490" fill="#111111" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">Sleep: 5.8 h baseline 7.4 ± 0.6</text>
  <text x="144" y="530" fill="#A14F2A" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700">Follow-up: Any symptoms in the last 48 hours?</text>

  <circle cx="866" cy="236" r="10" fill="#C75C34"/>
  <path d="M856 236H760" stroke="#C75C34" stroke-width="3"/>
  <text x="886" y="244" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">Alert family</text>
  <text x="886" y="274" fill="#6A655E" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20">One named policy, not free-form model output</text>

  <circle cx="866" cy="364" r="10" fill="#C75C34"/>
  <path d="M856 364H734" stroke="#C75C34" stroke-width="3"/>
  <text x="886" y="372" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">Persistence window</text>
  <text x="886" y="402" fill="#6A655E" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20">Drift has to persist before it becomes worth attention</text>

  <circle cx="866" cy="448" r="10" fill="#C75C34"/>
  <path d="M856 448H734" stroke="#C75C34" stroke-width="3"/>
  <text x="886" y="456" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">Personal baseline</text>
  <text x="886" y="486" fill="#6A655E" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20">Signals are measured against your normal, not a generic threshold</text>

  <circle cx="866" cy="532" r="10" fill="#C75C34"/>
  <path d="M856 532H734" stroke="#C75C34" stroke-width="3"/>
  <text x="886" y="540" fill="#171717" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">Follow-up question</text>
  <text x="886" y="570" fill="#6A655E" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20">The model is used to reduce uncertainty, not invent thresholds</text>

  <rect x="884" y="614" width="312" height="54" rx="27" fill="#191919"/>
  <text x="1040" y="648" text-anchor="middle" fill="#F9F4EA" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600">baseline + policy + explanation</text>
</svg>
